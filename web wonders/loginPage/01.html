<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyOS — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="01.css">
</head>

<body>

    <div class="brand">
        <div class="brand-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3L1 9l11 6 9-4.9V17h2V9L12 3z" fill="#fff" />
                <path
                    d="M5 13.18v4.34c0 .35.19.68.5.85L11.5 21c.31.17.69.17 1 0l6-2.63a.97.97 0 0 0 .5-.85v-4.34L12 17l-7-3.82z"
                    fill="#fff" opacity="0.85" />
            </svg>
        </div>
        <h1>StudyOS</h1>
        <p>Student Productivity OS</p>
    </div>

    <div class="card">

        <div class="tabs" role="tablist" aria-label="Auth mode">
            <button class="tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Log
                in</button>
            <button class="tab" id="tab-signup" role="tab" aria-selected="false" onclick="switchTab('signup')">Sign
                up</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="panel active" id="panel-login">

            <div class="oauth-group">
                <button class="oauth-btn" type="button" onclick="handleOAuth('google')">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4"
                            d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z" />
                        <path fill="#34A853"
                            d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.98v2.33A9 9 0 0 0 9 18z" />
                        <path fill="#FBBC05"
                            d="M3.95 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.98a9 9 0 0 0 0 8.08l2.97-2.33z" />
                        <path fill="#EA4335"
                            d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.96l2.97 2.33C4.66 5.16 6.65 3.58 9 3.58z" />
                    </svg>
                    Continue with Google
                </button>
                <button class="oauth-btn" type="button" onclick="handleOAuth('github')">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="#fff">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                    Continue with GitHub
                </button>
            </div>

            <div class="divider">or</div>

            <form onsubmit="handleSubmit(event, 'login')">
                <div class="field">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="field password-field">
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="button" class="toggle-visibility" onclick="togglePassword('login-password', this)"
                        aria-label="Show password">
                        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                            style="display:none;">
                            <path
                                d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.7 20.7 0 0 1 5.06-6.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a20.6 20.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>

                <div class="row-between">
                    <label class="checkbox-row">
                        <input type="checkbox" id="remember-me">
                        <span class="checkbox-box"></span>
                        Remember me
                    </label>
                    <a href="#" class="link-muted" onclick="return false;">Forgot password?</a>
                </div>

                <button class="submit-btn" type="submit">Log in</button>
            </form>
        </div>

        <!-- SIGNUP PANEL -->
        <div class="panel" id="panel-signup">

            <div class="oauth-group">
                <button class="oauth-btn" type="button" onclick="handleOAuth('google')">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4"
                            d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z" />
                        <path fill="#34A853"
                            d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.98v2.33A9 9 0 0 0 9 18z" />
                        <path fill="#FBBC05"
                            d="M3.95 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.98a9 9 0 0 0 0 8.08l2.97-2.33z" />
                        <path fill="#EA4335"
                            d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.96l2.97 2.33C4.66 5.16 6.65 3.58 9 3.58z" />
                    </svg>
                    Sign up with Google
                </button>
                <button class="oauth-btn" type="button" onclick="handleOAuth('github')">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="#fff">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                    Sign up with GitHub
                </button>
            </div>

            <div class="divider">or</div>

            <form onsubmit="handleSubmit(event, 'signup')">
                <div class="field">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="field">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="field password-field">
                    <input type="password" id="signup-password" placeholder="Password (min. 6 characters)" required
                        minlength="6" oninput="checkStrength(this.value)">
                    <button type="button" class="toggle-visibility" onclick="togglePassword('signup-password', this)"
                        aria-label="Show password">
                        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                            style="display:none;">
                            <path
                                d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.7 20.7 0 0 1 5.06-6.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a20.6 20.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>

                <div class="strength" id="strength-wrap">
                    <div class="strength-bars">
                        <span class="bar bar-1"></span>
                        <span class="bar bar-2"></span>
                        <span class="bar bar-3"></span>
                        <span class="bar bar-4"></span>
                    </div>
                    <span class="strength-label" id="strength-label">Password strength</span>
                </div>

                <button class="submit-btn" type="submit">Sign up</button>
            </form>
        </div>

    </div>

    <p class="hint">Your data is stored in MongoDB and scoped to your account only.</p>

    <script src="01.js"></script>
</body>

</html>
